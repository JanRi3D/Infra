---
# yaml-language-server: $schema=https://raw.githubusercontent.com/recyclarr/recyclarr/refs/tags/v8.6.0/schemas/config-schema.json
sonarr:
  series:
    base_url: http://sonarr
    api_key: !env_var SONARR_API_KEY
    delete_old_custom_formats: true
    media_management:
      propers_and_repacks: do_not_prefer
    media_naming:
      episodes:
        anime: default
        daily: default
        rename: true
        standard: default
      season: default
      series: jellyfin-tvdb
    quality_definition:
      type: series
    quality_profiles:
      - trash_id: dca7e5e9e99c703bcbdaaa471dd40e98 # [German] HD Bluray + WEB
        reset_unmatched_scores:
          enabled: true
        min_format_score: 10000
        min_upgrade_format_score: 10000
        upgrade:
          allowed: true
          until_quality: Merged QPs
          until_score: 35000
        qualities:
          - name: Merged QPs
            qualities:
              - Bluray-1080p
              - WEBRip-1080p
              - WEBDL-1080p
      - trash_id: 3b0fa37fddaaefc931b75f2889d4b4f5 # [German] UHD Bluray + WEB
        reset_unmatched_scores:
          enabled: true
        min_format_score: 10000
        min_upgrade_format_score: 10000
      - trash_id: 20e0fc959f1f1704bed501f23bdae76f # [Anime] Remux-1080p
        reset_unmatched_scores:
          enabled: true
        upgrade:
          allowed: true
          until_quality: Bluray 1080p
          until_score: 10000
        qualities:
          - name: Bluray 1080p
            qualities:
              - Bluray-1080p Remux
              - Bluray-1080p
          - name: WEB 1080p
            qualities:
              - HDTV-1080p
              - WEBRip-1080p
              - WEBDL-1080p
    custom_formats:
      - # FLUX trumps REPACKS
        trash_ids:
          - 5d9fd1b1e06cd8a475462f40214b7df6 # FLUX
        assign_scores_to:
          - trash_id: dca7e5e9e99c703bcbdaaa471dd40e98 # [German] HD Bluray + WEB
            score: 100
          - trash_id: 3b0fa37fddaaefc931b75f2889d4b4f5 # [German] UHD Bluray + WEB
            score: 100
      - # Unwanted
        trash_ids:
          - 32b367365729d530ca1c124a0b180c64 # Bad Dual Groups
          - 82d40da2bc6923f41e14394075dd4b03 # No-RlsGroup
          - e1a997ddb54e3ecbfe06341ad323c458 # Obfuscated
          - 06d66ab109d4d2eddb2794d21526d140 # Retags
        assign_scores_to:
          - trash_id: dca7e5e9e99c703bcbdaaa471dd40e98 # [German] HD Bluray + WEB
          - trash_id: 3b0fa37fddaaefc931b75f2889d4b4f5 # [German] UHD Bluray + WEB

radarr:
  movies:
    base_url: http://radarr
    api_key: !env_var RADARR_API_KEY
    delete_old_custom_formats: true
    media_management:
      propers_and_repacks: do_not_prefer
    media_naming:
      folder: jellyfin-tmdb
      movie:
        rename: true
        standard: jellyfin-tmdb
    quality_definition:
      type: movie
    quality_profiles:
      - trash_id: 2b90e905c99490edc7c7a5787443748b # [German] HD Bluray + WEB
        reset_unmatched_scores:
          enabled: true
        min_format_score: 10000
        min_upgrade_format_score: 10000
        upgrade:
          allowed: true
          until_quality: Merged QPs
          until_score: 35000
        qualities:
          - name: Merged QPs
            qualities:
              - Bluray-1080p
              - WEBRip-1080p
              - WEBDL-1080p
      - trash_id: 27cc3d153c0a799fd139ef1ff4c4cc42 # [German] UHD Bluray + WEB
        reset_unmatched_scores:
          enabled: true
        min_format_score: 10000
        min_upgrade_format_score: 10000
    custom_formats:
      - # Unwanted
        trash_ids:
          - 957d0f44b592285f26449575e8b1167e # Special Edition
          - b6832f586342ef70d9c128d40c07b872 # Bad Dual Groups
          - cc444569854e9de0b084ab2b8b1532b2 # Black and White Editions
          - ae9b7c9ebde1f3bd336a8cbd1ec4c5e5 # No-RlsGroup
          - 7357cf5161efbf8c4d5d0c30b4815ee2 # Obfuscated
          - 5c44f52a8714fdd79bb4d98e2673be1f # Retags
          - f537cf427b64c38c8e36298f657e4828 # Scene
        assign_scores_to:
          - trash_id: 2b90e905c99490edc7c7a5787443748b # [German] HD Bluray + WEB
          - trash_id: 27cc3d153c0a799fd139ef1ff4c4cc42 # [German] UHD Bluray + WEB

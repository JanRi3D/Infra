cluster:
  apiServer:
    auditPolicy:
      apiVersion: audit.k8s.io/v1
      kind: Policy
      rules:
        - level: Metadata
    certSANs:
      - k8s.internal
      - 10.0.20.11
      - 10.0.20.12
      - 10.0.20.13
    disablePodSecurityPolicy: true
    env:
      GOMEMLIMIT: 3GiB
    extraArgs:
      enable-aggregator-routing: "true"
      feature-gates: HPAScaleToZero=true
